name: Regenerate benchmark leaderboard

on:
  workflow_dispatch:
  schedule:
    # Weekly Sunday 03:00 UTC
    - cron: "0 3 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync --locked
          uv pip install git+https://github.com/biostochastics/clawbio_bench.git

      - name: Run benchmark (smoke mode)
        id: bench
        run: |
          mkdir -p bench_runs/latest
          uv run clawbio-bench --smoke --repo . --output bench_runs/latest --quiet || true
          # Even if some harnesses block, the aggregate report is still emitted
          if [ ! -f bench_runs/latest/aggregate_report.json ]; then
            echo "Bench did not produce aggregate_report.json"
            exit 1
          fi
          echo "report_path=bench_runs/latest/aggregate_report.json" >> "$GITHUB_OUTPUT"

      - name: Regenerate benchmarks.html
        run: |
          uv run python scripts/generate_leaderboard.py \
            --aggregate bench_runs/latest/aggregate_report.json \
            --html benchmarks.html

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet benchmarks.html bench_runs/latest/aggregate_report.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to leaderboard."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Leaderboard changed."
          fi

      - name: Open PR with refreshed leaderboard
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          branch: bot/refresh-benchmark-leaderboard
          delete-branch: true
          add-paths: |
            benchmarks.html
            bench_runs/latest/aggregate_report.json
          commit-message: |
            chore(bench): refresh benchmark leaderboard

            Auto-generated by .github/workflows/bench-leaderboard.yml
            from the latest clawbio_bench smoke run.
          title: "chore(bench): refresh benchmark leaderboard"
          body: |
            Automated refresh of `benchmarks.html` and `bench_runs/latest/aggregate_report.json` from the latest `clawbio_bench --smoke` run.

            Triggered by: ${{ github.event_name == 'workflow_dispatch' && 'manual dispatch' || format('scheduled run on {0}', github.event.schedule) }}.

            Review the diff to see which skills moved. If a skill regressed, that is the actual signal this workflow exists to surface; investigate the failing tests in `bench_runs/latest/<skill>/` before merging.

            If the diff looks clean, merge to update `clawbio.ai/benchmarks`.
          labels: |
            automated
            benchmark
